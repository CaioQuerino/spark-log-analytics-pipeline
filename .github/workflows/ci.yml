name: CI Pipeline

on:
  pull_request:
    branches:
      - '**'

  push:
    branches:
      - main

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Java (Necessário para PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pyspark boto3 python-dotenv

      - name: Executar lint
        run: |
          flake8 src

      - name: Executar testes unitários
        run: |
          pytest